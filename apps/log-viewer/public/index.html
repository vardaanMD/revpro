<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>revPRO Log Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --text: #e2e8f0;
      --muted: #8892a4;
      --info: #3b82f6;
      --info-bg: #1e3a5f;
      --warn: #f59e0b;
      --warn-bg: #3b2e0d;
      --error: #ef4444;
      --error-bg: #3b0e0e;
      --green: #22c55e;
      --green-bg: #0d2e18;
      --radius: 8px;
      --font-mono: 'JetBrains Mono', 'Fira Mono', 'Cascadia Code', monospace;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

    .layout { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 12px; padding: 14px 20px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    header h1 span { color: var(--muted); font-weight: 400; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0;
      box-shadow: 0 0 6px #22c55e88;
    }
    .status-dot.offline { background: var(--error); box-shadow: 0 0 6px #ef444488; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

    /* ── Health banner ── */
    .health-banner {
      display: flex; align-items: center; gap: 16px; padding: 10px 20px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
    }
    .health-banner.ok   { background: #0d2218; }
    .health-banner.warn { background: #1e1a08; }
    .health-banner.bad  { background: #1e0c0c; }

    .health-status { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .health-status .icon { font-size: 18px; }

    .stat-cards { display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 6px 14px; text-align: center; min-width: 70px;
    }
    .stat-card .num { font-size: 20px; font-weight: 700; line-height: 1; }
    .stat-card .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }
    .stat-card.errors .num  { color: var(--error); }
    .stat-card.warns .num   { color: var(--warn); }
    .stat-card.infos .num   { color: var(--info); }

    /* ── Controls bar ── */
    .controls {
      display: flex; align-items: center; gap: 10px; padding: 10px 20px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .chip-group { display: flex; gap: 4px; }
    .chip {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: transparent;
      color: var(--muted); transition: all 0.15s;
    }
    .chip:hover { border-color: var(--text); color: var(--text); }
    .chip.active           { background: var(--surface2); color: var(--text); border-color: #4e5a78; }
    .chip.info.active  { background: var(--info-bg);  color: var(--info);  border-color: var(--info);  }
    .chip.warn.active  { background: var(--warn-bg);  color: var(--warn);  border-color: var(--warn);  }
    .chip.error.active { background: var(--error-bg); color: var(--error); border-color: var(--error); }

    .search-input {
      padding: 5px 10px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 12px; width: 160px; outline: none;
    }
    .search-input:focus { border-color: #4e5a78; }
    .search-input::placeholder { color: var(--muted); }
    select.search-input { cursor: pointer; width: auto; }

    .toggle-btn {
      padding: 5px 12px; border-radius: var(--radius); font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface2);
      color: var(--muted); transition: all 0.15s; white-space: nowrap;
    }
    .toggle-btn:hover { color: var(--text); }
    .toggle-btn.active { background: #2d3a5a; color: var(--text); border-color: #4e5a78; }

    .sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .count-label { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }

    /* ── Log list ── */
    .log-list {
      flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 8px;
    }
    .log-list::-webkit-scrollbar { width: 6px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Pretty card ── */
    .log-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; transition: border-color 0.15s;
    }
    .log-card:hover { border-color: #4e5a78; }
    .log-card.info  { border-left: 3px solid var(--info); }
    .log-card.warn  { border-left: 3px solid var(--warn); }
    .log-card.error { border-left: 3px solid var(--error); }

    .card-header {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px;
      cursor: pointer; user-select: none;
    }
    .level-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 7px;
      border-radius: 4px; flex-shrink: 0; text-transform: uppercase; margin-top: 1px;
    }
    .info  .level-badge { background: var(--info-bg);  color: var(--info);  }
    .warn  .level-badge { background: var(--warn-bg);  color: var(--warn);  }
    .error .level-badge { background: var(--error-bg); color: var(--error); }

    .card-ts { font-size: 11px; color: var(--muted); font-family: var(--font-mono); flex-shrink: 0; margin-top: 2px; }
    .card-route {
      font-size: 11px; color: var(--muted); background: var(--surface2);
      padding: 2px 6px; border-radius: 4px; flex-shrink: 0; margin-top: 1px;
    }

    .card-text { flex: 1; min-width: 0; }
    .card-msg { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-explain { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

    .card-chevron { color: var(--muted); font-size: 11px; flex-shrink: 0; transition: transform 0.2s; margin-top: 3px; }
    .log-card.expanded .card-chevron { transform: rotate(90deg); }

    .card-body { padding: 0 14px 12px; display: none; }
    .log-card.expanded .card-body { display: block; }

    .meta-row { display: flex; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
    .meta-pill { font-size: 11px; color: var(--muted); }
    .meta-pill strong { color: var(--text); }

    .meta-block {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 8px 10px; font-family: var(--font-mono); font-size: 11.5px; color: #93c5fd;
      white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto;
    }

    /* ── Raw view ── */
    .raw-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 14px;
    }
    .raw-card pre { font-family: var(--font-mono); font-size: 11.5px; color: #93c5fd; white-space: pre-wrap; word-break: break-all; }

    /* ── Empty ── */
    .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 14px; }
    .empty .icon { font-size: 36px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header>
    <div class="status-dot" id="statusDot"></div>
    <h1>revPRO <span>/ Log Viewer</span></h1>
    <div class="header-right">
      <button class="toggle-btn active" id="autoRefreshBtn" onclick="toggleAutoRefresh()">↻ Live</button>
    </div>
  </header>

  <!-- Health banner -->
  <div class="health-banner ok" id="healthBanner">
    <div class="health-status">
      <span class="icon" id="healthIcon">✅</span>
      <span id="healthText">App looks healthy</span>
    </div>
    <div class="stat-cards">
      <div class="stat-card errors"><div class="num" id="statErrors">—</div><div class="lbl">Errors</div></div>
      <div class="stat-card warns"><div class="num" id="statWarns">—</div><div class="lbl">Warnings</div></div>
      <div class="stat-card infos"><div class="num" id="statInfos">—</div><div class="lbl">Info</div></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="chip-group">
      <button class="chip active" data-level="all"   onclick="setLevel('all')">All</button>
      <button class="chip info"   data-level="info"  onclick="setLevel('info')">INFO</button>
      <button class="chip warn"   data-level="warn"  onclick="setLevel('warn')">WARN</button>
      <button class="chip error"  data-level="error" onclick="setLevel('error')">ERROR</button>
    </div>
    <div class="sep"></div>
    <input class="search-input" id="shopInput"  placeholder="Filter shop..."  oninput="debounceRefresh()" />
    <input class="search-input" id="routeInput" placeholder="Filter route..." oninput="debounceRefresh()" />
    <select class="search-input" id="limitSelect" onchange="refresh()">
      <option value="50">50 entries</option>
      <option value="100" selected>100 entries</option>
      <option value="250">250 entries</option>
      <option value="500">500 entries</option>
    </select>
    <div class="sep"></div>
    <button class="toggle-btn" id="viewToggle" onclick="toggleView()">{ } Raw</button>
    <span class="count-label" id="countLabel">—</span>
  </div>

  <!-- Log list -->
  <div class="log-list" id="logList">
    <div class="empty"><div class="icon">📋</div>Loading logs…</div>
  </div>
</div>

<script>
  // ── Plain-English translations ──
  // Maps substrings of log messages → { short: "what happened", why: "why you might care" }
  const TRANSLATIONS = [
    { match: /redis connectivity test passed/i,
      short: 'Redis connected successfully',
      why: 'The database cache is online and working.' },
    { match: /redis connectivity test failed/i,
      short: 'Redis connection failed',
      why: 'Caching is down — the app will be slower and may fall back to defaults.' },
    { match: /redis.*error|connection error/i,
      short: 'Redis connection problem',
      why: 'The cache layer is having issues. Performance may be degraded.' },
    { match: /cache miss/i,
      short: 'No cached result — computing fresh',
      why: 'The app had to do extra work this request instead of using a saved result.' },
    { match: /cache hit/i,
      short: 'Served from cache',
      why: 'Fast path — a saved result was used, no extra computation needed.' },
    { match: /decision timeout|300.?ms|timeout.*fallback/i,
      short: 'Decision took too long — used safe default',
      why: 'A cart decision timed out. The shopper saw a fallback (no cross-sells). Fine occasionally, bad if frequent.' },
    { match: /rate limit/i,
      short: 'Too many requests from one shop',
      why: 'A shop hit the request limit. Their requests are being throttled.' },
    { match: /unhandled.*rejection|uncaught/i,
      short: 'Unexpected error in the background',
      why: 'Something crashed silently. Check the meta details.' },
    { match: /401|unauthenticated|auth.*fail/i,
      short: 'Authentication failed',
      why: 'A request came in without valid credentials. Usually a Shopify session issue.' },
    { match: /prisma|database|db.*error/i,
      short: 'Database issue',
      why: 'Something went wrong reading or writing to the database.' },
    { match: /fallback.*used|using fallback/i,
      short: 'Fallback mode activated',
      why: 'Something failed and the app used a safe default instead.' },
    { match: /shop config/i,
      short: 'Loading shop settings',
      why: 'The app fetched or failed to fetch a store\'s configuration.' },
    { match: /webhook/i,
      short: 'Shopify webhook received',
      why: 'Shopify sent an event (order, product update, etc.) to the app.' },
    { match: /server boot|boot start/i,
      short: 'Server started',
      why: 'The app just booted up (or restarted).' },
    { match: /heartbeat/i,
      short: 'App is still running',
      why: 'A periodic ping to confirm the process is alive.' },
  ];

  function translate(message) {
    for (const t of TRANSLATIONS) {
      if (t.match.test(message)) return t;
    }
    return null;
  }

  // ── State ──
  let state = {
    level: 'all',
    view: 'pretty',
    autoRefresh: true,
    refreshTimer: null,
    debounceTimer: null,
    entries: [],
  };

  // ── Level filter ──
  function setLevel(level) {
    state.level = level;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.level === level));
    refresh();
  }

  // ── View toggle ──
  function toggleView() {
    state.view = state.view === 'pretty' ? 'raw' : 'pretty';
    const btn = document.getElementById('viewToggle');
    btn.textContent = state.view === 'pretty' ? '{ } Raw' : '◈ Pretty';
    btn.classList.toggle('active', state.view === 'raw');
    render(state.entries);
  }

  // ── Auto-refresh ──
  function toggleAutoRefresh() {
    state.autoRefresh = !state.autoRefresh;
    const btn = document.getElementById('autoRefreshBtn');
    btn.classList.toggle('active', state.autoRefresh);
    btn.textContent = state.autoRefresh ? '↻ Live' : '↻ Paused';
    if (state.autoRefresh) scheduleRefresh();
    else clearTimeout(state.refreshTimer);
  }

  function scheduleRefresh() {
    clearTimeout(state.refreshTimer);
    if (state.autoRefresh) state.refreshTimer = setTimeout(() => refresh(), 3000);
  }

  function debounceRefresh() {
    clearTimeout(state.debounceTimer);
    state.debounceTimer = setTimeout(refresh, 400);
  }

  // ── Fetch ──
  async function refresh() {
    const level = state.level === 'all' ? '' : state.level;
    const shop  = document.getElementById('shopInput').value.trim();
    const route = document.getElementById('routeInput').value.trim();
    const limit = document.getElementById('limitSelect').value;
    const token = new URLSearchParams(location.search).get('token') || '';

    const params = new URLSearchParams({ limit: 500 }); // always fetch 500 for stats
    if (token) params.set('token', token);

    const dot = document.getElementById('statusDot');

    try {
      const res = await fetch(`/api/logs?${params}`);
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();
      const all = data.entries || [];

      updateHealth(all);

      // apply client-side filters for display
      let filtered = all;
      if (level) filtered = filtered.filter(e => e.level === level);
      if (shop)  filtered = filtered.filter(e => (e.shop || '').toLowerCase().includes(shop.toLowerCase()));
      if (route) filtered = filtered.filter(e => (e.route || '').toLowerCase().includes(route.toLowerCase()));
      filtered = filtered.slice(0, parseInt(limit));

      state.entries = filtered;
      dot.classList.remove('offline');
      document.getElementById('countLabel').textContent = `${filtered.length} shown of ${all.length} total`;
      render(filtered);
    } catch (e) {
      dot.classList.add('offline');
      document.getElementById('countLabel').textContent = 'Connection error';
    }

    scheduleRefresh();
  }

  // ── Health banner ──
  function updateHealth(entries) {
    const errors = entries.filter(e => e.level === 'error').length;
    const warns  = entries.filter(e => e.level === 'warn').length;
    const infos  = entries.filter(e => e.level === 'info').length;

    document.getElementById('statErrors').textContent = errors;
    document.getElementById('statWarns').textContent  = warns;
    document.getElementById('statInfos').textContent  = infos;

    const banner = document.getElementById('healthBanner');
    const icon   = document.getElementById('healthIcon');
    const text   = document.getElementById('healthText');

    banner.className = 'health-banner';
    if (errors > 0) {
      banner.classList.add('bad');
      icon.textContent = '🔴';
      text.textContent = `${errors} error${errors > 1 ? 's' : ''} in the last ${entries.length} logs — something needs attention`;
    } else if (warns > 5) {
      banner.classList.add('warn');
      icon.textContent = '⚠️';
      text.textContent = `${warns} warnings — app is running but hitting some bumps`;
    } else if (entries.length === 0) {
      banner.classList.add('ok');
      icon.textContent = '💤';
      text.textContent = 'No logs yet — start revstack to see activity';
    } else {
      banner.classList.add('ok');
      icon.textContent = '✅';
      text.textContent = 'App looks healthy';
    }
  }

  // ── Render ──
  function render(entries) {
    const list = document.getElementById('logList');
    if (!entries.length) {
      list.innerHTML = '<div class="empty"><div class="icon">🔍</div>No logs match your filters.</div>';
      return;
    }
    list.innerHTML = entries.map((e, i) =>
      state.view === 'pretty' ? prettyCard(e, i) : rawCard(e, i)
    ).join('');
  }

  function prettyCard(e, i) {
    const ts    = timeAgo(e.timestamp);
    const t     = translate(e.message);
    const meta  = e.meta ? JSON.stringify(e.meta, null, 2) : null;
    const route = e.route ? `<span class="card-route">${esc(e.route)}</span>` : '';
    const shop  = e.shop  ? `<span class="meta-pill"><strong>shop</strong> ${esc(e.shop)}</span>` : '';
    const reqId = e.requestId ? `<span class="meta-pill"><strong>reqId</strong> ${esc(e.requestId)}</span>` : '';
    const hasBody = e.shop || e.requestId || meta;

    const displayMsg = t ? esc(t.short) : esc(e.message);
    const explain = t
      ? `<div class="card-explain">${esc(t.why)}</div>`
      : (e.message !== (t?.short) ? '' : '');

    const metaBlock = meta ? `<div class="meta-block">${esc(meta)}</div>` : '';

    return `
<div class="log-card ${e.level}" id="card-${i}">
  <div class="card-header" onclick="toggleCard(${i})">
    <span class="level-badge">${e.level}</span>
    <span class="card-ts">${ts}</span>
    ${route}
    <div class="card-text">
      <div class="card-msg">${displayMsg}</div>
      ${explain}
    </div>
    ${hasBody ? '<span class="card-chevron">▶</span>' : ''}
  </div>
  ${hasBody ? `
  <div class="card-body">
    ${(shop || reqId) ? `<div class="meta-row">${shop}${reqId}</div>` : ''}
    ${metaBlock}
  </div>` : ''}
</div>`;
  }

  function rawCard(e) {
    return `<div class="raw-card"><pre>${esc(JSON.stringify(e, null, 2))}</pre></div>`;
  }

  function toggleCard(i) {
    document.getElementById(`card-${i}`)?.classList.toggle('expanded');
  }

  // ── Helpers ──
  function timeAgo(iso) {
    if (!iso) return '';
    try {
      const diff = Date.now() - new Date(iso).getTime();
      const s = Math.floor(diff / 1000);
      if (s < 5)  return 'just now';
      if (s < 60) return `${s}s ago`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    } catch { return iso; }
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Boot ──
  refresh();
</script>
</body>
</html>
