<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V2 vs V3 Cart Drawer — Forensic Comparison</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; padding: 12px; background: #1a1a1a; color: #eee; }
    h1 { font-size: 1.25rem; margin: 0 0 12px 0; }
    .layout { display: flex; gap: 16px; flex-wrap: wrap; }
    .column { flex: 1; min-width: 320px; }
    .column h2 { font-size: 1rem; margin: 0 0 8px 0; color: #888; }
    .host { position: relative; min-height: 420px; border: 1px solid #444; border-radius: 8px; overflow: hidden; background: #222; }
    .host .label { position: absolute; top: 8px; left: 8px; z-index: 1; font-size: 11px; color: #888; }
    #cart-pro-root, #revstack-v3-root { width: 100%; height: 400px; }
    .controls { margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .controls button { padding: 8px 14px; font-size: 13px; cursor: pointer; border-radius: 6px; border: 1px solid #555; background: #333; color: #eee; }
    .controls button:hover { background: #444; }
    .log { margin-top: 16px; padding: 12px; background: #111; border-radius: 8px; font-family: monospace; font-size: 11px; white-space: pre-wrap; max-height: 60vh; overflow: auto; }
    .log h3 { margin: 0 0 8px 0; font-size: 12px; color: #6af; }
    .log .entry { margin-bottom: 12px; padding: 8px; background: #1a1a1a; border-radius: 4px; }
    .log .diff { color: #fa6; }
    .log .same { color: #6a6; }
  </style>
  <!-- V2 CSS (loaded in document for #cart-pro-root; V2 also injects critical CSS into shadow) -->
  <link rel="stylesheet" href="../archived-extensions/cart-pro-v1-v2/assets/cart-pro.css" />
</head>
<body>
  <h1>V2 vs V3 Cart Drawer — Forensic Side-by-Side</h1>
  <p style="font-size: 12px; color: #888;">Mock snapshot and cart used. Open both drawers, then click "Run forensic audit" to log computed styles.</p>

  <div class="controls">
    <button type="button" id="btn-open-v2" data-cart-toggle>Open V2 Drawer</button>
    <button type="button" id="btn-open-v3">Open V3 Drawer</button>
    <button type="button" id="btn-forensic">Run forensic audit</button>
  </div>

  <div class="layout">
    <div class="column">
      <h2>V2 (cart-pro-ui.js + cart-pro-v2.js)</h2>
      <div class="host">
        <span class="label">#cart-pro-root</span>
        <div id="cart-pro-root"></div>
      </div>
    </div>
    <div class="column">
      <h2>V3 (cart-pro-v3 runtime)</h2>
      <div class="host">
        <span class="label">#revstack-v3-root</span>
        <div id="revstack-v3-root"></div>
      </div>
    </div>
  </div>

  <div id="forensic-log" class="log" style="display:none;"></div>

  <script>
    // ——— Mock snapshot (must be set before V2 scripts run) ———
    window.__CART_PRO_V2_SNAPSHOT__ = {
      ui: {
        primaryColor: "#ff0000",
        accentColor: "#000000",
        borderRadius: 14,
        showConfetti: true,
        countdownEnabled: true
      },
      capabilities: {
        allowCrossSell: true,
        allowMilestones: true,
        allowCouponTease: true
      },
      upsell: { products: [] },
      variantIds: [],
      aiEnabled: false
    };

    // ——— Mock fetch for /cart.js so V2 init can complete (no real backend) ———
    (function () {
      var origFetch = window.fetch;
      window.fetch = function (url, opts) {
        var u = typeof url === 'string' ? url : (url && url.url);
        if (u && (u.indexOf('/cart.js') !== -1 || u.endsWith('/cart.js'))) {
          return Promise.resolve({
            ok: true,
            json: function () {
              return Promise.resolve({
                token: 'mock',
                note: null,
                attributes: {},
                original_total_price: 0,
                total_price: 0,
                total_discount: 0,
                total_weight: 0,
                item_count: 0,
                items: [],
                requires_shipping: false,
                currency: 'USD'
              });
            }
          });
        }
        if (u && (u.indexOf('/cart/change.js') !== -1 || u.indexOf('/cart/add.js') !== -1)) {
          return origFetch.apply(this, arguments).catch(function () {
            return { ok: false, json: function () { return Promise.resolve({}); } };
          });
        }
        return origFetch.apply(this, arguments);
      };
    })();
  </script>
  <script src="../archived-extensions/cart-pro-v1-v2/assets/cart-pro-ui.js"></script>
  <script src="../archived-extensions/cart-pro-v1-v2/assets/cart-pro-v2.js"></script>

  <script>
    // ——— Open V3 drawer and load config after V3 script loads ———
    function initV3() {
      if (typeof window.CartProV3Engine === 'undefined') return;
      var engine = window.CartProV3Engine;
      engine.loadConfig({
        appearance: {
          primaryColor: "#ff0000",
          accentColor: "#000000",
          borderRadius: 14,
          showConfetti: true,
          countdownEnabled: true
        },
        freeShipping: { thresholdCents: 5000 },
        discounts: { teaseMessage: "Test tease" },
        upsell: {},
        rewards: {},
        checkout: {},
        analytics: {},
        featureFlags: {}
      });
      document.getElementById('btn-open-v3').addEventListener('click', function () {
        engine.setState({ ui: { drawerOpen: true } });
        if (typeof engine.onDrawerOpened === 'function') engine.onDrawerOpened();
      });
    }
  </script>
  <script src="../extensions/cart-pro/assets/cart-pro-v3.js" onload="initV3()"></script>

  <script>
    // ——— Forensic logging: computed styles for both carts ———
    var FORENSIC_SELECTORS = [
      '#cart-pro-drawer',
      '#cart-pro-checkout',
      '.cp-checkout-btn',
      '.cp-shipping-container',
      '.cp-free-shipping-msg',
      '.cp-coupon-banner',
      '#cart-pro-confetti-layer',
      '#cart-pro-overlay',
      '#cart-pro-footer'
    ];
    var FORENSIC_PROPS = [
      'background', 'backgroundImage', 'filter', 'opacity', 'mixBlendMode',
      'transform', 'zIndex', 'boxShadow', 'backdropFilter'
    ];
    var FORENSIC_VARS = ['--cp-primary', '--cp-accent', '--cp-radius', '--cp-surface', '--cp-shadow', '--cp-border', '--cp-overlay'];

    function getComputedFor(el, label) {
      if (!el) return null;
      var cs = window.getComputedStyle(el);
      var out = { label: label, tag: el.tagName, id: el.id || '', class: el.className || '' };
      FORENSIC_PROPS.forEach(function (p) {
        try {
          var val = p === 'background' ? cs.background : (p === 'backgroundImage' ? cs.backgroundImage : cs.getPropertyValue(p));
          out[p] = (val && val.trim && val.trim()) || val || '';
        } catch (e) { out[p] = ''; }
      });
      FORENSIC_VARS.forEach(function (v) {
        try { out[v] = (cs.getPropertyValue(v) || '').trim() || '(not set)'; } catch (e) { out[v] = ''; }
      });
      return out;
    }

    function getHostCssVars(hostEl) {
      if (!hostEl) return {};
      var cs = window.getComputedStyle(hostEl);
      var out = {};
      FORENSIC_VARS.forEach(function (v) {
        try { out[v] = (cs.getPropertyValue(v) || '').trim() || '(not set)'; } catch (e) { out[v] = ''; }
      });
      return out;
    }

    function runForensicAudit() {
      var logEl = document.getElementById('forensic-log');
      logEl.style.display = 'block';
      logEl.innerHTML = '';

      function append(title, html) {
        var section = document.createElement('div');
        section.className = 'entry';
        section.innerHTML = '<h3>' + title + '</h3>' + html;
        logEl.appendChild(section);
      }

      function escape(str) {
        return String(str).replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      var v2Root = document.getElementById('cart-pro-root');
      var v3Root = document.getElementById('revstack-v3-root');
      var v2Shadow = v2Root && v2Root.shadowRoot;
      var v3Shadow = v3Root && v3Root.shadowRoot;

      if (!v2Shadow) {
        append('V2 Shadow', 'V2 shadow root not found. Open V2 drawer first.');
      } else {
        append('V2 Shadow root', 'Found. Child count: ' + v2Shadow.childElementCount);
      }
      if (!v3Shadow) {
        append('V3 Shadow root', 'V3 shadow root not found. Open V3 drawer first.');
      } else {
        var v3App = v3Shadow.querySelector('#cart-pro-v3-app');
        var v3DrawerHost = v3App ? v3App.querySelector('#cart-pro') : null;
        append('V3 Shadow root', 'Found. #cart-pro-v3-app: ' + (v3App ? 'yes' : 'no') + ', #cart-pro: ' + (v3DrawerHost ? 'yes' : 'no'));
      }

      var v2Results = {};
      var v3Results = {};
      FORENSIC_SELECTORS.forEach(function (sel) {
        var v2El = v2Shadow ? v2Shadow.querySelector(sel) : null;
        var v3El = v3Shadow ? v3Shadow.querySelector(sel) : null;
        v2Results[sel] = getComputedFor(v2El, 'V2 ' + sel);
        v3Results[sel] = getComputedFor(v3El, 'V3 ' + sel);
      });

      FORENSIC_SELECTORS.forEach(function (sel) {
        var v2 = v2Results[sel];
        var v3 = v3Results[sel];
        var title = 'Selector: ' + sel;
        var html = '';
        if (!v2 && !v3) { html = 'Not found in either.'; }
        else if (!v2) { html = 'V2: (not found)<br>V3: ' + (v3 ? JSON.stringify(v3, null, 2) : '(not found)'); }
        else if (!v3) { html = 'V2: ' + JSON.stringify(v2, null, 2) + '<br>V3: (not found)'; }
        else {
          html = '<pre>' + escape(JSON.stringify({ V2: v2, V3: v3 }, null, 2)) + '</pre>';
          var diff = [];
          FORENSIC_PROPS.concat(FORENSIC_VARS).forEach(function (p) {
            if (v2[p] !== v3[p]) diff.push(p + ': V2=' + v2[p] + ' vs V3=' + v3[p]);
          });
          if (diff.length) html += '<p class="diff">Diff: ' + escape(diff.join(' | ')) + '</p>';
        }
        append(title, html);
      });

      // Host CSS variable resolution (#cart-pro-root vs #revstack-v3-root)
      var v2HostVars = getHostCssVars(v2Root);
      var v3HostVars = getHostCssVars(v3Root);
      append('Host CSS variables (root propagation)', '<pre>V2 #cart-pro-root: ' + escape(JSON.stringify(v2HostVars, null, 2)) + '\n\nV3 #revstack-v3-root: ' + escape(JSON.stringify(v3HostVars, null, 2)) + '</pre>');

      // Confetti layer forensic
      var v2Confetti = v2Shadow ? v2Shadow.getElementById('cart-pro-confetti-layer') : null;
      var v3Confetti = v3Shadow ? v3Shadow.getElementById('cart-pro-confetti-layer') : null;
      var c2 = v2Confetti ? getComputedStyle(v2Confetti) : null;
      var c3 = v3Confetti ? getComputedStyle(v3Confetti) : null;
      append('Confetti layer (#cart-pro-confetti-layer)', [
        'V2: ' + (v2Confetti ? 'exists | zIndex=' + (c2 && c2.zIndex) + ' | pointerEvents=' + (c2 && c2.pointerEvents) + ' | opacity=' + (c2 && c2.opacity) + ' | display=' + (c2 && c2.display) : 'missing'),
        'V3: ' + (v3Confetti ? 'exists | zIndex=' + (c3 && c3.zIndex) + ' | pointerEvents=' + (c3 && c3.pointerEvents) + ' | opacity=' + (c3 && c3.opacity) + ' | display=' + (c3 && c3.display) : 'missing')
      ].join('<br>'));
    }

    document.getElementById('btn-forensic').addEventListener('click', runForensicAudit);
  </script>
</body>
</html>
