# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e628e4d55fee98b8b638d71462f718d0"
name = "revstack"
application_url = "https://revpro-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/billing/update"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid", "orders/cancelled" ]
  uri = "/webhooks/orders"

  [[webhooks.subscriptions]]
  topics = [ "refunds/create" ]
  uri = "/webhooks/refunds"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_orders required for webhooks: orders/paid, orders/cancelled, refunds/create
# read_discounts required for coupon code validation via Admin GraphQL (codeDiscountNodeByCode)
scopes = "write_products write_app_proxy read_orders read_discounts"

[auth]
redirect_urls = [ "https://revpro-production.up.railway.app/auth/callback" ]

[app_proxy]
url = "https://revpro-production.up.railway.app/cart"
subpath = "cart-pro"
prefix = "apps"

[[extensions]]
type = "theme_app_extension"
handle = "cart-pro"
path = "extensions/cart-pro"
